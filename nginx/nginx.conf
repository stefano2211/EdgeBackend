server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Permitir subida de archivos de hasta 100MB (sincronizado con backend y MinIO)
    client_max_body_size 100M;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 1. Optimización para Server-Sent Events (SSE - Chat y Eventos en tiempo real)
    # Debe ir antes del bloque de API general porque las regex se evalúan en orden
    location ~ ^/api/v1/(chat/stream|events/stream)(/|$) {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Directivas críticas para evitar almacenamiento en búfer de SSE
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # Evitar desconexiones de streams inactivos (24 horas)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_set_header Connection "";
    }

    # 2. API, webhooks, docs, health (Regex corregida con barra diagonal opcional)
    location ~ ^/(api|webhooks|docs|health|openapi\.json)(/|$) {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. SPA fallback (Vue Router history mode)
    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
