upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:80;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Subidas de archivos de hasta 100MB (sincronizado con backend y MinIO)
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 1. Optimización para Server-Sent Events (SSE - Chat y Eventos en tiempo real)
    # Debe ir antes del bloque de API general porque las regex se evalúan en orden
    location ~ ^/api/v1/(chat/stream|events/stream)(/|$) {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Directivas críticas para evitar almacenamiento en búfer de SSE
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # Evitar desconexiones de streams inactivos (24 horas)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_set_header Connection "";
    }

    # 2. API, webhooks, docs, health (Regex con barra diagonal opcional)
    location ~ ^/(api|webhooks|docs|health|openapi\.json)(/|$) {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. SPA estática (Vue Router history mode)
    # Todo lo demás va al frontend Nginx
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
